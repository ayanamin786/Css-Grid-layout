<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Grid</title>

<style>
*{
  margin:0;
  padding:0;
  border-radius: 11px;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

.container{
  display: grid;
  grid-template-columns: 250px 1fr 1fr;
  grid-template-rows: 70px auto auto 60px;
  gap: 20px;
  min-height: 100vh;
  padding: 10px;
  background: #ddd;
}

/* Header */
.header{
  grid-column: 1 / 4;
  background: #333;
  color: white;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* Sidebar */
.sidebar{
  grid-row: 2 / 4;
  background: #444;
  color: white;
  padding: 15px;
}

/* Boxes */
.analytics{
  background: #8fb3c1;
  padding: 15px;
  border-radius: 10px;
}

.activity{
  background: #7ed17e;
  padding: 15px;
  border-radius: 10px;
}

.statistics{
  grid-column: 2 / 4;
  background: #e57373;
  padding: 15px;
  border-radius: 10px;
}

/* Footer */
.footer{
  grid-column: 1 / 4;
  background: #333;
  color: white;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* ✅ Tablet */
@media (max-width: 992px){
  .container{
    grid-template-columns: 200px 1fr;
  }

  .header, .footer{
    grid-column: 1 / 3;
  }

  .statistics{
    grid-column: 2 / 3;
  }
}

/* ✅ Mobile */
@media (max-width: 600px){
  .container{
    grid-template-columns: 1fr;
  }

  .header, .footer,
  .sidebar,
  .analytics,
  .activity,
  .statistics{
    grid-column: 1 / 2;
    grid-row: auto;
  }

  .sidebar{
    grid-row: auto;
  }
}
</style>
</head>

<body>

<div class="container">
  
  <div class="header">Header</div>
  
  <div class="sidebar">Sidebar</div>
  
  <div class="analytics">Analytics</div>
  
  <div class="activity">Recent Activity</div>
  
  <div class="statistics">Statistics</div>
  
  <div class="footer">Footer</div>

</div>

</body>
</html>
